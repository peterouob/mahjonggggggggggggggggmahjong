#    env_file:
#      - .env
#    depends_on:
#      mysql:
#        condition: service_healthy
#      redis:
#        condition: service_healthy
#    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  my_bridge:
    driver: bridge
